<div class="flex items-center justify-center p-6">
  <div class="app-card-sm">
    <h1 class="app-title-primary mb-4">
      {{ 'HOME.WELCOME_MESSAGE' | translate: { name: user()?.fullName || user()?.userName || 'User' } }}
    </h1>
    <p class="app-text-muted text-lg">
      {{ 'HOME.LOGIN_SUCCESS' | translate }}
    </p>
    
    <div class="mt-6">
      <button

        class="btn-secondary">
        {{ 'HOME.LOGOUT' | translate }}
      </button>
    </div>
  </div>
</div>
