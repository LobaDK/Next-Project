<div class="space-y-4" (click)="$event.stopPropagation()">

  <!-- Prompt -->
  <div>
    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide">
      Prompt
    </label>
    <input
      class="w-full border rounded px-3 py-2"
      [ngModel]="question.prompt"
      (ngModelChange)="updatePrompt($event)"
      placeholder="Enter question prompt"
      type="text"
    />
  </div>

  <!-- Options -->
  <div>
    <div class="flex items-center justify-between">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">
        Options
      </p>

      <button
        type="button"
        class="btn-secondary btn-sm"
        (click)="addOption(); $event.stopPropagation()"
        [disabled]="!canAddOption"
      >
        + Add option
      </button>
    </div>

    @if (!canAddOption) {
      <p class="text-xs text-gray-500 mt-1">
        Max 10 options reached
      </p>
    }

<div class="space-y-2 mt-2"
     cdkDropList
     (cdkDropListDropped)="dropOption($event)">

  @for (opt of question.options; track opt.value; let i = $index) {
    <div class="grid grid-cols-1 sm:grid-cols-12 gap-2 items-center border rounded p-2"
         cdkDrag
         cdkDragLockAxis="y">

      <!-- Drag handle -->
      <div class="sm:col-span-1 flex items-center justify-center">
        <div
          cdkDragHandle
          class="cursor-move select-none rounded px-2 py-1 bg-gray-100 hover:bg-gray-200 text-gray-600"
          title="Drag to reorder"
          (click)="$event.stopPropagation()"
        >
          ☰
        </div>
      </div>

      <!-- Label -->
      <div class="sm:col-span-8">
        <label class="block text-xs text-gray-500">Label</label>
        <input
          class="w-full border rounded px-2 py-1"
          [ngModel]="opt.label"
          (ngModelChange)="updateOptionLabel(i, $event)"
          type="text"
        />
      </div>

      <!-- Remove -->
      <div class="sm:col-span-1 flex justify-end">
        <button
          type="button"
          class="btn-danger btn-sm"
          (click)="removeOption(i); $event.stopPropagation()"
          [disabled]="question.options.length <= 1"
          title="Remove option"
        >
          ✕
        </button>
      </div>

    </div>
  }
</div>

  </div>

  <!-- Other/comment -->
  <div class="border rounded p-3 space-y-2">
    <div class="flex items-center gap-2">
      <input
        type="checkbox"
        [ngModel]="question.allowOtherComment"
        (ngModelChange)="toggleOther($event)"
        (click)="$event.stopPropagation()"
        id="allowOther"
      />
      <label for="allowOther" class="text-sm text-gray-700">
        Allow "Other" comment
      </label>
    </div>

    @if (question.allowOtherComment) {
      <div>
        <label class="block text-xs text-gray-500">Other label</label>
        <input
          class="w-full border rounded px-2 py-1"
          [ngModel]="question.otherLabel"
          (ngModelChange)="updateOtherLabel($event)"
          type="text"
        />
      </div>
    }
  </div>

</div>
