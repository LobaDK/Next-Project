<div class="list-item">
  <div class="w-full flex flex-col gap-3">

    <!-- Top row always visible -->
    <div class="flex items-start justify-between gap-4 w-full">
    <div>
        <p class="text-brand-navy font-semibold">
        Question {{ index + 1 }}
        </p>
        <p class="text-gray-600 text-sm">
        {{ item.prompt || "Untitled question" }}
        </p>
    </div>

    <div class="flex items-center gap-2">
        <button
        type="button"
        class="btn-secondary"
        (click)="onToggle()"
        >
        {{ expanded ? 'View' : 'Edit' }}
        </button>

        <button type="button" class="btn-danger" (click)="onDelete($event)">
        Delete
        </button>
    </div>
    </div>

    <!-- Expanded content -->
@if (expanded) {
  <div class="bg-bg-white/60 border border-brand-orange/30 rounded-lg p-4 space-y-3">

    <!-- Type -->
    <div>
      <p class="text-gray-500 text-xs font-semibold uppercase tracking-wide">
        Type
      </p>
      <p class="text-brand-navy font-medium">
        {{ typeLabel }}
      </p>
    </div>

    @switch (item.type) {

      @case ('radiogroup') {
        <app-radio-group-editor
          [question]="item"
          (questionChange)="itemChange.emit($event)"
        />
      }

    }

  </div>
}


  </div>
</div>
