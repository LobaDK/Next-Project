<div class="app-page section-spacing">
  <div class="app-card">

    <h1 class="app-title-primary mb-6">Template Details</h1>

    <!-- Name -->
    <div class="mb-6">
      <label class="form-label">Name</label>
      <input
        class="input-field"
        type="text"
        placeholder="Enter template name..."
        [(ngModel)]="editor.title"
        [maxLength]="LIMITS.TEMPLATE_TITLE_MAX_LEN"
      />
    </div>

    <!-- Description + Finalize -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 items-start">
      <div>
        <label class="form-label">Description</label>
        <textarea
          class="textarea-field"
          rows="4"
          placeholder="Enter template description..."
          [(ngModel)]="editor.description"
          [maxLength]="LIMITS.TEMPLATE_DESCRIPTION_MAX_LEN"
        ></textarea>
      </div>

      <div class="flex sm:justify-end gap-2">
        <button
          type="button"
          class="btn btn-lg w-full sm:w-auto mt-6 sm:mt-7 bg-gray-200 hover:bg-gray-300 text-gray-800"
          (click)="togglePreview()"
        >
          {{ showPreview ? 'Hide Preview' : 'Preview Survey' }}
        </button>

        <button
          type="button"
          class="btn btn-lg w-full sm:w-auto mt-6 sm:mt-7 bg-purple-600 hover:bg-purple-700 focus:ring-purple-500 text-white"
          (click)="finalize()"
        >
          Finalize
        </button>
      </div>
    </div>

    <!-- Preview -->
    @if (showPreview && surveyModel) {
      <div class="mt-8 border rounded p-4 bg-gray-50">
        <h2 class="app-title-secondary mb-3">Survey Preview</h2>
        <survey [model]="surveyModel"></survey>
      </div>
    }

    <!-- Questions -->
    <div class="mt-10">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
          <h2 class="app-title-secondary mb-1">Questions</h2>
          <p class="text-gray-600 text-sm">Manage your questions below.</p>
        </div>

        <button
          type="button"
          class="btn-primary w-full sm:w-auto"
          (click)="addQuestion()"
        >
          + Add question
        </button>
      </div>

      <!-- Question List -->
<div
  class="space-y-4"
  cdkDropList
  (cdkDropListDropped)="dropQuestion($event)"
>
  @for (q of questions; track q.id; let i = $index) {

    <div
      cdkDrag
      cdkDragLockAxis="y"
      class="flex gap-2"
      [cdkDragDisabled]="expandedIndex === i"
    >
      <!-- Left-side drag handle -->
<div
  cdkDragHandle
  class="inline-flex items-center justify-center select-none rounded-lg p-2
         bg-gray-100 text-gray-500 hover:bg-gray-200 cursor-move
         disabled:opacity-50"
  [class.opacity-40]="expandedIndex === i"
  [class.cursor-not-allowed]="expandedIndex === i"
  title="Drag to reorder"
>
  ☰
</div>

      <!-- Your actual question component stays fully clickable -->
      <div class="flex-1">
        <app-question
          [(item)]="questions[i]"
          [index]="i"
          [expanded]="expandedIndex === i"
          (toggle)="toggleExpanded(i)"
          (delete)="deleteQuestion(i)"
        />
      </div>
    </div>

  }
</div>


    </div>

  </div>
</div>
