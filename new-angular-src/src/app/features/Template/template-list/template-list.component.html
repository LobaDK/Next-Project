<div class="app-page section-spacing">
  <div class="app-card">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
      <div>
        <h1 class="app-title-primary mb-1">Templates</h1>
        <p class="text-gray-600 text-sm">Manage your templates below.</p>
      </div>

      <button type="button" class="btn-primary">
        + Create template
      </button>
    </div>

    <!-- List -->
<div class="space-y-4">
  @for (t of templates; track t.id) {
    <div class="list-item list-none items-center sm:flex-row sm:justify-between">

      <!-- Left side -->
      <div class="flex items-center gap-3 flex-wrap">
        <p class="font-semibold text-brand-navy break-words">
          {{ t.title }}
        </p>

        <span class="badge" [ngClass]="getBadgeClass(t.status)">
          {{ t.status }}
        </span>
      </div>

      <!-- Right side -->
      <div
        class="flex gap-2 w-full sm:w-auto justify-start sm:justify-end mt-2 sm:mt-0"
        (click)="$event.stopPropagation()"
      >
        <button
          type="button"
          class="btn-secondary flex-1 sm:flex-none"
          (click)="editTemplate(t.id)"
        >
          Edit
        </button>
        <button
            type="button"
            class="btn-success flex-1 sm:flex-none"
            (click)="copyTemplate(t.id)"
        >
            Copy
        </button>

        <button
          type="button"
          class="btn-danger flex-1 sm:flex-none"
          (click)="deleteTemplate(t.id)"
        >
          Delete
        </button>
      </div>

    </div>
  }
</div>


    <!-- Empty state -->
    @if (templates.length === 0) {
      <div class="center-content py-10 text-gray-600">
        <p class="text-lg font-medium">No templates yet</p>
        <p class="text-sm">Create your first one to get started.</p>
      </div>
    }
  </div>
</div>
